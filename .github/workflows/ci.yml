name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay_test
          POSTGRES_DB: relay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ scripts/ --ignore=E501,F401

      - name: Python syntax check
        run: |
          python -m compileall app/ scripts/

      - name: Create .env for CI
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://relay:relay_test@localhost:5432/relay_test" > .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" >> .env
          echo "DEBUG=false" >> .env

      - name: Run alembic migrations
        run: |
          python -m alembic upgrade head

      - name: Run smoke tests (Phase 1)
        run: |
          python scripts/smoke_test.py
        timeout-minutes: 5

      - name: Run smoke tests (Phase 2)
        run: |
          python scripts/smoke_test_phase2.py
        timeout-minutes: 5

      - name: Run unit tests (if any)
        run: |
          if [ -d "tests" ] && [ -n "$(ls -A tests/test_*.py 2>/dev/null)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No unit tests found yet — skipping"
          fi
        timeout-minutes: 5
