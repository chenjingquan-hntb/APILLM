# ============================================================
# LLM Relay — 本地开发环境
# 启动:  docker compose up -d
# 停止:  docker compose down
# 清理:  docker compose down -v  (同时删除数据卷)
# ============================================================
#
# 组件清单:
#   llmrelay-postgres  PostgreSQL 16  (端口 5432)
#   llmrelay-redis     Redis 7        (端口 6379)
#
# 所有数据持久化在 Docker 命名卷中，重启容器不会丢失。

version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: llmrelay-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llmrelay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d llmrelay"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "project=llmrelay"
      - "component=database"

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: llmrelay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: >
      redis-server
        --appendonly yes
        --save 900 1
        --save 300 10
        --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "project=llmrelay"
      - "component=cache"

# ── 命名数据卷 ──────────────────────────────────────────────
volumes:
  pgdata:
    name: llmrelay-pgdata
    labels:
      project: llmrelay
  redisdata:
    name: llmrelay-redisdata
    labels:
      project: llmrelay
