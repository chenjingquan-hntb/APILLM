<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APILLM — 大模型中转站</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- =========================================================== -->
<!-- 顶栏 -->
<!-- =========================================================== -->
<header id="app-bar">
  <span class="logo">APILLM</span>
  <nav id="app-nav">
    <a href="#home" class="nav-link active">首页</a>
    <a href="#user" class="nav-link nav-user-only" style="display:none">用户后台</a>
    <a href="#admin" class="nav-link nav-admin-only" style="display:none">管理后台</a>
  </nav>
  <div id="app-user-area">
    <button id="btn-login-go" class="btn-text">登录</button>
    <span id="user-info" style="display:none">
      <span id="user-name"></span>
      <button id="btn-logout" class="btn-text">退出</button>
    </span>
  </div>
</header>

<!-- =========================================================== -->
<!-- 视图容器 -->
<!-- =========================================================== -->
<main id="app-content">

  <!-- HOME ------------------------------------------------- -->
  <section id="view-home" class="view active">
    <!-- 健康条 -->
    <div class="health-bar" id="health-bar">
      <span id="hb-status"><span class="dot"></span>检测中</span>
      <span id="hb-upstreams"></span>
      <span id="hb-time"></span>
      <button id="hb-refresh" class="btn-icon" title="刷新">&#x21bb;</button>
    </div>

    <!-- 模型卡片网格 -->
    <div class="card-grid" id="model-card-grid">
      <div class="message">加载中…</div>
    </div>
    <div class="actions-row">
      <button id="btn-load-models" class="btn">刷新模型列表</button>
    </div>
  </section>

  <!-- LOGIN ------------------------------------------------ -->
  <section id="view-login" class="view">
    <div class="login-box">
      <h2>登录</h2>
      <div class="form-group">
        <label for="login-username">用户名</label>
        <input id="login-username" type="text" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="login-password">密码</label>
        <input id="login-password" type="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <div class="form-group">
        <button id="btn-login" class="btn primary" style="width:100%">登录</button>
      </div>
      <div id="login-error" class="form-error" style="display:none"></div>
    </div>
  </section>

  <!-- ADMIN ------------------------------------------------ -->
  <section id="view-admin" class="view">
    <div class="tab-bar" id="admin-tabs">
      <button class="tab active" data-tab="upstreams">上游管理</button>
      <button class="tab" data-tab="models">模型配置</button>
      <button class="tab" data-tab="users">用户管理</button>
      <button class="tab" data-tab="stats">数据看板</button>
    </div>

    <!-- 上游管理 tab -->
    <div class="tab-panel active" id="admin-tab-upstreams">
      <div class="toolbar">
        <button id="btn-upstream-add" class="btn">+ 新增上游</button>
        <button id="btn-price-fetch" class="btn">抓取价格</button>
        <button id="btn-health-check" class="btn">健康检查</button>
      </div>
      <table class="data-table" id="table-upstreams">
        <thead><tr><th>名称</th><th>协议</th><th>地址</th><th>状态</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 模型配置 tab -->
    <div class="tab-panel" id="admin-tab-models">
      <div class="toolbar">
        <button id="btn-model-add" class="btn">+ 新增模型</button>
      </div>
      <table class="data-table" id="table-models">
        <thead><tr><th>模型ID</th><th>展示名</th><th>手动价格/Kt</th><th>状态</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 用户管理 tab -->
    <div class="tab-panel" id="admin-tab-users">
      <div class="toolbar">
        <button id="btn-user-add" class="btn">+ 新建用户</button>
      </div>
      <table class="data-table" id="table-users">
        <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>余额</th><th>状态</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 数据看板 tab -->
    <div class="tab-panel" id="admin-tab-stats">
      <div class="stat-cards" id="admin-stat-cards"></div>
      <div class="toolbar">
        <button id="btn-stats-models" class="btn">按模型统计</button>
        <button id="btn-stats-upstreams" class="btn">按上游统计</button>
      </div>
      <table class="data-table" id="table-stats">
        <thead><tr><th>维度</th><th>调用次数</th><th>Token输入</th><th>Token输出</th><th>费用</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- USER ------------------------------------------------- -->
  <section id="view-user" class="view">
    <div class="tab-bar" id="user-tabs">
      <button class="tab active" data-tab="keys">API Key</button>
      <button class="tab" data-tab="logs">调用日志</button>
      <button class="tab" data-tab="stats">数据看板</button>
      <button class="tab" data-tab="recharge">充值</button>
    </div>

    <!-- API Key tab -->
    <div class="tab-panel active" id="user-tab-keys">
      <div class="toolbar">
        <button id="btn-key-create" class="btn">+ 创建 API Key</button>
      </div>
      <table class="data-table" id="table-keys">
        <thead><tr><th>标签</th><th>Key</th><th>创建时间</th><th>最近使用</th><th>操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 调用日志 tab -->
    <div class="tab-panel" id="user-tab-logs">
      <table class="data-table" id="table-logs">
        <thead><tr><th>时间</th><th>模型</th><th>上游</th><th>Token</th><th>费用</th><th>状态</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="pager" id="logs-pager"></div>
    </div>

    <!-- 数据看板 tab -->
    <div class="tab-panel" id="user-tab-stats">
      <div class="stat-cards" id="user-stat-cards"></div>
    </div>

    <!-- 充值 tab -->
    <div class="tab-panel" id="user-tab-recharge">
      <div class="message" style="padding:3rem;text-align:center">
        <p style="font-size:2rem;margin-bottom:1rem">💳</p>
        <p>充值功能即将上线</p>
      </div>
    </div>
  </section>

</main>

<!-- =========================================================== -->
<!-- 全局弹窗容器 -->
<!-- =========================================================== -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <span id="modal-title"></span>
      <button class="btn-icon modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
